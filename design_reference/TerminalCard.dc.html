<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="background:#0c0c0f;border:1px solid #1b1b21;border-radius:12px;display:flex;flex-direction:column;height:100%;min-height:0;overflow:hidden">
  <div style="height:38px;flex-shrink:0;display:flex;align-items:center;gap:9px;padding:0 11px;border-bottom:1px solid #16161a;background:#0e0e12">
    <span style="{{ session.dotStyle }}"></span>
    <span style="font-size:12.5px;font-weight:600;color:#e4e4ea;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0">{{ session.name }}</span>
    <span style="font-size:10px;color:#6b6b74;font-family:'Geist Mono', monospace">{{ session.statusLabel }}</span>
    <span style="{{ session.modelStyle }}">{{ session.model }}</span>
    <span onClick="{{ session.onOpen }}" style="display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;color:#6f6f78;cursor:pointer;font-family:'Material Symbols Rounded';font-size:16px" style-hover="background:#191920;color:#cfcfd6">open_in_full</span>
  </div>
  <div style="flex:1;min-height:0;overflow-y:auto;padding:11px 12px;background:#0a0a0c">
    <div style="display:flex;flex-direction:column;gap:2px">
      <sc-for list="{{ session.lines }}" as="line" hint-placeholder-count="5">
        <div style="{{ line.st }}">{{ line.prefix }}{{ line.text }}</div>
      </sc-for>
      <sc-if value="{{ session.running }}" hint-placeholder-val="{{ true }}">
        <span style="display:inline-block;width:7px;height:13px;background:var(--accent,#5b9dd9);animation:blink 1s steps(1) infinite;margin-top:2px"></span>
      </sc-if>
    </div>
  </div>
  <div style="flex-shrink:0;border-top:1px solid #16161a;background:#0c0c0f;padding:7px 10px;display:flex;align-items:center;gap:8px">
    <span style="color:var(--accent,#5b9dd9);font-family:'Geist Mono', monospace;font-size:13px">&rsaquo;</span>
    <input value="{{ session.draft }}" onChange="{{ session.onChange }}" onKeyDown="{{ session.onKey }}" placeholder="Message this session…" style="flex:1;min-width:0;background:transparent;border:none;color:#e4e4ea;font-size:12.5px;font-family:'Geist Mono', monospace" />
    <span onClick="{{ session.onSend }}" style="display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;background:var(--accent-soft,rgba(91,157,217,0.13));color:var(--accent,#5b9dd9);cursor:pointer;font-family:'Material Symbols Rounded';font-size:16px" style-hover="background:var(--accent,#5b9dd9);color:#0a1018">arrow_upward</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:480,&quot;height&quot;:340},&quot;session&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
